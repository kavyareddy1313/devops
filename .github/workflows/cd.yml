name: deploy to ec2
on:
 workflow_run:
     workflows: ["Docker Image CI"]
     types : 
             - completed

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
          - name: deploy to ec2
            uses: appleboy/ssh-action@master
            with:
                host: ${{secrets.EC2_HOST}}
                username: ${{secrets.EC2_USER}}
                key: ${{secrets.EC2_KEY}}
                script: | 
                   docker pull kavya00/node-app1:latest
                   docker rm -f node-app1 || true
                   docker run -d -p 4000:3000 --name node-app1 kavya00/node-app1:latest
                
                    

                 
